<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #262626;
      --surface: rgba(38, 38, 38, 0.92);
      --surface-border: rgba(172, 191, 164, 0.12);
      --text: #fffaf2;
      --muted: rgba(226, 232, 206, 0.8);
      --primary: #FF7F11;
      --primary-hover: #ff972f;
      --primary-active: #ffb15e;
      --secondary: rgba(255, 127, 17, 0.12);
      --secondary-border: rgba(172, 191, 164, 0.14);
      --info: #E2E8CE;
    }

    html,
    body {
      height: 250px;
      width: 520px;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, Söhne, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      background: linear-gradient(180deg, #1f1f1f 0%, #262626 100%);
      color: var(--text);
    }

    .extension-container {
      box-sizing: border-box;
      height: 100%;
      padding: 16px;
      background: transparent;
      color: var(--text);
    }

    .extension-container.dark {
      background: linear-gradient(180deg, #1f1f1f 0%, #262626 100%);
      color: var(--text);
    }

    .panel {
      box-sizing: border-box;
      height: 100%;
      padding: 16px;
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: transparent;
      background: linear-gradient(90deg, #FF7F11 0%, #ff9f42 45%, #ffd08a 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
      background: rgba(255, 127, 17, 0.08);
      border: 1px solid var(--surface-border);
      transition: background-color 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .header-link:hover {
      color: var(--primary-hover);
      background: rgba(255, 127, 17, 0.14);
      transform: translateY(-1px);
    }

    .header-link svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .container-1 {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--surface-border);
    }

    .container-1 span {
      display: flex;
      align-items: center;
      color: var(--info);
      font-size: 0.8rem;
      font-weight: 600;
      min-width: 135px;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .buttons button {
      appearance: none;
      border: 1px solid var(--secondary-border);
      border-radius: 10px;
      cursor: pointer;
      padding: 0.48rem 0.7rem;
      white-space: nowrap;
      font-size: 0.77rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--primary);
      background: var(--secondary);
      transition: transform 120ms ease, background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease, color 120ms ease;
      box-shadow: 0 1px 2px rgba(255, 127, 17, 0.06);
    }

    .buttons button:hover {
      background: rgba(255, 127, 17, 0.18);
      border-color: rgba(255, 127, 17, 0.28);
      color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(255, 127, 17, 0.16);
    }

    .buttons button:active {
      background: rgba(255, 127, 17, 0.24);
      border-color: rgba(255, 127, 17, 0.36);
      color: var(--primary-active);
    }

    .buttons button.hidden {
      display: none;
    }

    #stop-all-backup {
      color: #1f1204;
      background: var(--primary);
      border-color: rgba(255, 127, 17, 0.24);
    }

    #stop-all-backup:hover {
      background: var(--primary-hover);
      border-color: rgba(255, 127, 17, 0.32);
      box-shadow: 0 10px 22px rgba(255, 127, 17, 0.2);
    }

    #stop-all-backup:active {
      background: var(--primary-active);
      color: #1f1204;
    }

    #progress {
      margin-top: 6px;
      padding: 0;
      padding-left: 5px;
      background: transparent;
      color: var(--info);
      font-size: 0.77rem;
      line-height: 1.35;
      min-height: 18px;
      border: none;
    }
  </style>
</head>

<body>
  <div class="extension-container">
    <div class="panel">
      <div class="header">
        <h2>ChatGPT Backup</h2>
        <a class="header-link" href="https://x.com/devfredy" target="_blank" rel="noreferrer" aria-label="devfredy on X">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.244 2H21.5l-7.11 8.128L22.75 22h-6.544l-5.126-6.708L5.21 22H1.95l7.604-8.69L1.5 2h6.71l4.634 6.127L18.244 2Zm-1.144 18h1.804L7.23 3.896H5.294L17.1 20Z"/>
          </svg>
        </a>
      </div>

      <div class="container-1">
        <span>Backup all chats as</span>
        <div class="buttons">
          <button id="download-as-json">JSON</button>
          <button id="download-as-raw-json">RAW JSON</button>
          <button id="download-as-markdown">MARKDOWN</button>
          <button id="stop-all-backup" class="hidden">Stop and Download</button>
        </div>
      </div>

      <div class="container-1">
        <span>Backup current chat as</span>
        <div class="buttons">
          <button id="download-current-chat-as-json">JSON</button>
          <button id="download-current-chat-as-raw-json">RAW JSON</button>
          <button id="download-current-chat-as-markdown">MARKDOWN</button>
        </div>
      </div>

      <div id="progress"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
