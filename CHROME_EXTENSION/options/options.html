<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-rowb {
      display: flex;
      flex-direction: column;
      align-content: flex-start;
      justify-content: left;
      text-align: left;
    }
    textarea {
      max-width: 400px;
    }
    .helper-text {
      color: #8a8a8a;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <h1>options</h1>
  <form>
  <div class="field-row">
    <label for="startOffset">Skip newest chats:</label>
    <input type="number" id="startOffset" name="startOffset" value="0" min="0">
  </div>
  <span class="helper-text">0 = start from your newest chat.</span>
  <br></br>
  <div class="field-row">
    <label for="maxChatsToExport">Max chats to export:</label>
    <input type="number" id="maxChatsToExport" name="maxChatsToExport" value="40" min="0" placeholder="Leave empty for all">
  </div>
    <span class="helper-text">Leave empty to export all remaining chats after the skipped ones.</span>
  <br></br>
  <!-- markdown labels / snippets -->
  <div class="field-rowb">
    <label for="user" class="labelb">USER:</label>
    <textarea id="user" name="user" rows="3" cols="40"><img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" width="24" alt="User" /></textarea>
    <span class="helper-text">Supports plain text, markdown, or HTML.</span>
  </div>

  <br></br>
  <div class="field-rowb">
    <label for="assistant" class="labelb">ASSISTANT:</label>
    <textarea id="assistant" name="assistant" rows="3" cols="40"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" width="24" alt="Assistant" /></textarea>
  <span class="helper-text">Supports plain text, markdown, or HTML.</span>
  <span class="helper-text">Defaults use small HTML images with fixed width.</span>
  </div>
  <br></br>
  <input type="submit" value="Save">
</form>
<script src="./options.js"></script>
</body>
</html>
