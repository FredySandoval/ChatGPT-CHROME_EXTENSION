<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>options</h1>
  <form>
  <label for="startOffset">Start Offset:</label>
  <input type="number" id="startOffset" name="startOffset" value="0">
  <br></br>
  <!-- <hr> -->
  <label for="stopOffset">Stop Offset:</label>
  <input type="number" id="stopOffset" name="stopOffset" value="-1">
  <br></br>
  <!-- markdown labels / snippets -->
  <label for="user">USER:</label>
  <br></br>
  <textarea id="user" name="user" rows="3" cols="40"><img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" width="24" alt="User" /></textarea>

  <br></br>
  <label for="assistant">ASSISTANT:</label>
  <br></br>
  <textarea id="assistant" name="assistant" rows="3" cols="40"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" width="24" alt="Assistant" /></textarea>
  <p>You can enter plain text, markdown, or HTML here. Defaults use small HTML images with fixed width.</p>
  <br></br>
  <input type="submit" value="Save">
</form>
<script src="./options.js"></script>
</body>
</html>
